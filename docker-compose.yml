version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-stack-app}-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Mount volume để lưu dữ liệu persistent
      - /home/ubuntu/api/data:/app/data
      - /home/ubuntu/api/uploads:/app/public/uploads
      - /home/ubuntu/api/logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - stack-network

networks:
  stack-network:
    driver: bridge
